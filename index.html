<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAQ Chatbot — NLP Powered</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

:root{
  --bg:#132029;
  --surface:#1b2c37;
  --border:#2c4250;
  --teal:#4fbdae;
  --teal-soft:#4fbdae22;
  --amber:#e3a34e;
  --text:#eaf1ef;
  --text-mid:#9fb4b0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:30px 16px;
}
.app{
  width:100%;
  max-width:560px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  height:80vh;
  max-height:720px;
}
header{
  padding:20px 22px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  gap:12px;
}
.avatar{
  width:38px;height:38px;border-radius:50%;
  background:var(--teal);
  display:flex;align-items:center;justify-content:center;
  font-family:'Space Grotesk',sans-serif;
  font-weight:700;
  color:var(--bg);
}
header h1{
  font-family:'Space Grotesk',sans-serif;
  font-size:1rem;
  font-weight:600;
}
header p{
  font-size:0.78rem;
  color:var(--text-mid);
  font-family:'JetBrains Mono',monospace;
  margin-top:2px;
}
.status-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--teal);
  margin-left:auto;
  box-shadow:0 0 8px var(--teal);
}

.chat-window{
  flex:1;
  overflow-y:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:14px;
}
.msg{
  max-width:80%;
  padding:11px 15px;
  border-radius:12px;
  font-size:0.92rem;
  line-height:1.5;
}
.msg.bot{
  background:var(--border);
  align-self:flex-start;
  border-bottom-left-radius:3px;
}
.msg.user{
  background:var(--teal);
  color:var(--bg);
  align-self:flex-end;
  border-bottom-right-radius:3px;
  font-weight:500;
}
.msg.bot .confidence{
  display:block;
  margin-top:6px;
  font-family:'JetBrains Mono',monospace;
  font-size:0.68rem;
  color:var(--text-mid);
}

.suggestions{
  padding:0 20px 14px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.suggestions button{
  background:transparent;
  border:1px solid var(--border);
  color:var(--teal);
  font-family:'JetBrains Mono',monospace;
  font-size:0.72rem;
  padding:6px 12px;
  border-radius:20px;
  cursor:pointer;
  transition:all 0.2s;
}
.suggestions button:hover{background:var(--teal-soft);}

form{
  display:flex;
  gap:10px;
  padding:16px 20px;
  border-top:1px solid var(--border);
}
input[type=text]{
  flex:1;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:8px;
  padding:11px 14px;
  color:var(--text);
  font-family:'Inter',sans-serif;
  font-size:0.9rem;
  outline:none;
}
input[type=text]:focus{border-color:var(--teal);}
button.send{
  background:var(--teal);
  color:var(--bg);
  border:none;
  border-radius:8px;
  padding:0 20px;
  font-weight:600;
  cursor:pointer;
  font-family:'Space Grotesk',sans-serif;
}
button.send:hover{background:#63cbbd;}
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="avatar">AI</div>
    <div>
      <h1>Support FAQ Assistant</h1>
      <p>NLP · Cosine Similarity Matching</p>
    </div>
    <span class="status-dot"></span>
  </header>

  <div class="chat-window" id="chatWindow"></div>

  <div class="suggestions" id="suggestions"></div>

  <form id="chatForm">
    <input type="text" id="userInput" placeholder="Ask a question..." autocomplete="off">
    <button type="submit" class="send">Send</button>
  </form>
</div>

<script>
// ---------------------------------------------------------
// FAQ knowledge base
// ---------------------------------------------------------
const FAQ = [
  {q:"What are your business hours?", a:"We're open Sunday to Thursday, 9 AM to 6 PM (local time)."},
  {q:"How do I reset my password?", a:"Go to Settings → Security → Reset Password, and follow the link sent to your email."},
  {q:"What payment methods do you accept?", a:"We accept credit/debit cards, PayPal, and bank transfer."},
  {q:"How can I track my order?", a:"You'll receive a tracking link by email once your order ships — you can also check it under 'My Orders'."},
  {q:"What is your refund policy?", a:"Refunds are available within 14 days of purchase, as long as the product is unused."},
  {q:"How do I contact customer support?", a:"You can reach us via live chat, email at support@example.com, or the contact form on our site."},
  {q:"Do you offer international shipping?", a:"Yes, we ship to most countries. Shipping costs and times vary by destination."},
  {q:"Can I change my shipping address after ordering?", a:"Yes, as long as the order hasn't shipped yet — contact support immediately to update it."},
  {q:"How do I cancel my subscription?", a:"Go to Account → Subscriptions → Cancel. You'll keep access until the end of the billing period."},
  {q:"Is there a mobile app available?", a:"Yes, our app is available on both iOS and Android app stores."},
  {q:"How long does delivery take?", a:"Standard delivery takes 3-5 business days; express delivery takes 1-2 business days."},
  {q:"Do you offer student discounts?", a:"Yes, students get 15% off with a valid student email or ID verification."},
  {q:"What should I do if I received a damaged item?", a:"Contact support with photos of the damage within 48 hours for a free replacement."},
  {q:"How do I create an account?", a:"Click 'Sign Up' at the top of the page and fill in your email and a password."},
  {q:"Can I use multiple discount codes at once?", a:"Only one discount code can be applied per order."},
];

// ---------------------------------------------------------
// NLP preprocessing: lowercase, strip punctuation, tokenize, remove stopwords
// ---------------------------------------------------------
const STOPWORDS = new Set(["a","an","the","is","are","do","does","i","you","my","your","how","what","can","of","to","for","in","on","and","or","it","this","that","be","with"]);

function preprocess(text){
  return text
    .toLowerCase()
    .replace(/[^\w\s]/g, " ")
    .split(/\s+/)
    .filter(w => w && !STOPWORDS.has(w));
}

// ---------------------------------------------------------
// TF-IDF vectorization (built from scratch, no dependencies)
// ---------------------------------------------------------
const docs = FAQ.map(f => preprocess(f.q));
const vocab = [...new Set(docs.flat())];

function termFreq(tokens){
  const tf = {};
  tokens.forEach(t => tf[t] = (tf[t]||0) + 1);
  const len = tokens.length || 1;
  Object.keys(tf).forEach(k => tf[k] /= len);
  return tf;
}

const idf = {};
vocab.forEach(term => {
  const docCount = docs.filter(d => d.includes(term)).length;
  idf[term] = Math.log((docs.length + 1) / (docCount + 1)) + 1;
});

function vectorize(tokens){
  const tf = termFreq(tokens);
  return vocab.map(term => (tf[term]||0) * idf[term]);
}

const faqVectors = docs.map(vectorize);

function cosineSimilarity(a, b){
  let dot=0, magA=0, magB=0;
  for(let i=0;i<a.length;i++){
    dot += a[i]*b[i];
    magA += a[i]*a[i];
    magB += b[i]*b[i];
  }
  if(magA===0 || magB===0) return 0;
  return dot / (Math.sqrt(magA) * Math.sqrt(magB));
}

function findBestMatch(query){
  const qVector = vectorize(preprocess(query));
  let best = {score:-1, index:-1};
  faqVectors.forEach((v, i) => {
    const score = cosineSimilarity(qVector, v);
    if(score > best.score) best = {score, index:i};
  });
  return best;
}

// ---------------------------------------------------------
// Chat UI
// ---------------------------------------------------------
const chatWindow = document.getElementById('chatWindow');
const form = document.getElementById('chatForm');
const input = document.getElementById('userInput');
const suggestionsBar = document.getElementById('suggestions');

function addMessage(text, sender, confidence=null){
  const div = document.createElement('div');
  div.className = 'msg ' + sender;
  div.textContent = text;
  if(confidence !== null){
    const c = document.createElement('span');
    c.className = 'confidence';
    c.textContent = `match confidence: ${(confidence*100).toFixed(0)}%`;
    div.appendChild(c);
  }
  chatWindow.appendChild(div);
  chatWindow.scrollTop = chatWindow.scrollHeight;
}

function respond(query){
  addMessage(query, 'user');
  const {score, index} = findBestMatch(query);
  setTimeout(() => {
    if(score > 0.15){
      addMessage(FAQ[index].a, 'bot', score);
    } else {
      addMessage("I'm not sure about that one — try rephrasing, or contact support@example.com for help.", 'bot');
    }
  }, 300);
}

form.addEventListener('submit', (e) => {
  e.preventDefault();
  const val = input.value.trim();
  if(!val) return;
  respond(val);
  input.value = '';
});

// Suggestion chips (random sample of FAQ questions)
function loadSuggestions(){
  suggestionsBar.innerHTML = '';
  const sample = [...FAQ].sort(()=>0.5-Math.random()).slice(0,3);
  sample.forEach(f => {
    const btn = document.createElement('button');
    btn.textContent = f.q;
    btn.onclick = () => { respond(f.q); };
    suggestionsBar.appendChild(btn);
  });
}

// Welcome message
addMessage("Hi! I'm an FAQ assistant built with NLP + cosine similarity. Ask me anything about orders, payments, or your account.", 'bot');
loadSuggestions();
</script>
</body>
</html>
